{% extends "base.html" %}

{% block content %}
   
    <form method="POST" action="{{ url_for('cirteria_data') }}">
        
        <div class="form-section ">
            <h1 style="text-align: center;"> التقييم الذاتي لجوانب و معايير التقييم و مؤشرات الأداء </h1>
            
            <div class="form-group2">
                <label for="semester"> أ - طور المقررات الدراسية في مجال التخصص والتي قام بتدريسها و حدث مادتها العلمية خلال الفصل الدراسي </label>
                <input type="number" min="0" max="5" id="Develop_courses" name="Develop_courses" placeholder=" الحد الاعلي للدرجة 5 " required>
            </div>
            <div class="form-group2">
                <label for="course_code"> ب - اعداد ملف المقرر بشقيه توصيف المقرر وتقرير المقرر</label>
                <input type="number" min="0" max="5" id="Prepare_file" name="Prepare_file" placeholder=" الحد الاعلي للدرجة 5 " required>
            </div>
            <div class="form-group2">
                <label for="course_name"> جـ - فعل نظام إدارة التعلم D2L و QuestionMark   </label>
                <input type="number" min="0" max="5" id="Electronic_tests" name="Electronic_tests" placeholder="الحد الاعلي للدرجة 5  ">
            </div>
            <div class="form-group2">
                <label for="semester_type">  د - أعد محتوى المادة العلمية لمقرراته الدراسية في شكل محتوى الكتروني تفاعلي </label>
                <input type="number" min="0" max="5" id="Prepare_material_content" name="Prepare_material_content" placeholder=" الحد الاعلي للدرجة 5 ">
            </div>

            <div class="form-group2">
                <label for="num_students"> هـ - وظف مصادرالتعلم الرقمية لمقرراته الدراسية بفاعلية و كفاءة </label>
                <input type="number" min="0" max="5" id="Use_learning_effectively" name="Use_learning_effectively" placeholder="الحد الاعلي للدرجة 5 ">
            </div>
            <div class="form-group2">
                <label for="teaching_load"> و - نوع من أساليب التدريس التي تشجع التفكير والابداع و الابتكار </label>
                <input type="number" min="0" max="5" id="teaching_methods" name="teaching_methods" placeholder="الحد الاعلي للدرجة 5 ">
            </div>
            <div class="form-group2">
                <label for="credit_hours">  ز - من الأساليب المستخدمة في تقييم الطالب:
                    نوع الاختبارات القصيرة/ الاختبارات الدورية/ البحث/
                    الواجبات/ العروض التقييمية/ النقاشات / الحوارات </label>
                <input type="number" min="0" max="5" id="Methods_student" name="Methods_student" placeholder="الحد الاعلي للدرجة 5  ">
            </div>
            <div class="form-group2">
                <label for="teaching_load"> ح - التزم بضوابط اعداد أسئلةالاختبارات ومعاييرها </label>
                <input type="number" min="0" max="5" id="preparing_test_questions" name="preparing_test_questions" placeholder="الحد الاعلي للدرجة 5 ">
            </div>
            <div class="form-group2">
                <label for="teaching_load">  ط - قدم الارشاد الأكاديمي للطلاب </label>
                <input type="number" min="0" max="5" id="Provide_academic_guidance" name="Provide_academic_guidance" placeholder="الحد الاعلي للدرجة 5 ">
            </div>
        <div class="form-group">
            <button type="submit" class="button">   🔄 تسجيل البيانات  </button>
        </div>
        </div>
        
       
      
      
    </form>
{% endblock %}
