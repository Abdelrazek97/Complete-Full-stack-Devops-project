{% extends "base.html" %}

{% block content %}
   
    <form method="POST" action="{{ url_for('university_evaluation') }}">
        
        <div class="form-section ">
            <h1 style="text-align: center;" > التقييم الذاتي لخدمة القسم و الكلية و الجامعة و المجتمع  </h1>
            
            <div class="form-group2">
                <label for="semester">  أ - شارك بفاعلية في اعمال القسم والكلية والجامعة </label>
                <input type="number" id="department_load" name="department_load"  min="0" max="5" placeholder=" الحد الاعلي للدرجة 5 " required>
            </div>
            <div class="form-group2">
                <label for="course_code"> ب - شارك بفاعلية بورش التطوير والتدريب المهني  </label>
                <input type="number" id="workshop_develop" name="workshop_develop"  min="0" max="5" placeholder=" الحد الاعلي للدرجة 5 " required>
            </div>
            <div class="form-group2">
                <label for="course_name"> جـ - شارك بفاعلية ببرامج المسؤولية المجتمعية </label>
                <input type="number"   min="0" max="5" id="program_bank" name="program_bank" placeholder="الحد الاعلي للدرجة 5  ">
            </div>
            <div class="form-group2">
                <label for="semester_type">  د - قدم خدمات علاجية تستخدم  (في حالة التخصص الاكلينيكي)  </label>
                <input type="number"  min="0" max="5" id="medical_services" name="medical_services" placeholder=" الحد الاعلي للدرجة 5 ">
            </div>
        <div class="form-group">
            <button type="submit" class="button">  🔄 تسجيل البيانات </button>
        </div>
        </div>
        
        
    </form>
{% endblock %}
